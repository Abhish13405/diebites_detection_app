<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
            <center>
        
    <h1>Diabetes Prediction System</h1>
<form action="/predict" method="post">

    <input type="number" name="preg" placeholder="Pregnancies" required><br><br>

    <input type="number" name="glucose" placeholder="Glucose" required><br><br>

    <input type="number" name="bp" placeholder="Blood Pressure" required><br><br>

    <input type="number" name="skin" placeholder="Skin Thickness" required><br><br>

    <input type="number" name="insulin" placeholder="Insulin" required><br><br>

    <input type="number" step="any" name="bmi" placeholder="BMI" required><br><br>

    <input type="number" step="any" name="dpf" placeholder="Diabetes Pedigree Function" required><br><br>

    <input type="number" name="age" placeholder="Age" required><br><br>

    <button type="submit">Predict</button>

</form>
<h2>{{ prediction_text }}</h2>
    </center>
    </div>
</body>
</html>
